<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Date Invitation ❤️</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ff9a9e,#fad0c4);display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
.screen{display:none;text-align:center}.active{display:block}
h1,h2,p{color:#fff}button{padding:14px 28px;border:0;border-radius:12px;margin:10px;font-size:20px;cursor:pointer}
#yes{background:#2ecc71;color:#fff}#no{background:#e74c3c;color:#fff}
.foods{display:grid;grid-template-columns:repeat(2,180px);gap:12px;justify-content:center}
.food{background:#fff;padding:14px;border-radius:10px;cursor:pointer}
.gif{width:220px;border-radius:18px;margin-bottom:18px}
.heart{position:absolute;animation:f 5s linear forwards}
@keyframes f{to{transform:translateY(110vh);opacity:0}}
</style></head><body>
<div id="p1" class="screen active">
<img class="gif" src="https://media.tenor.com/5iTAW0vB8fAAAAAC/bear-love.gif">
<h1>❤️ Will you go on a date with me? ❤️</h1>
<button id="yes">YES ❤️</button><button id="no">NO 😅</button></div>

<div id="p2" class="screen"><h1>🍽️ What would you like to eat?</h1>
<div class="foods">
<div class="food">🍕 Pizza</div><div class="food">🍝 Pasta</div>
<div class="food">🍣 Sushi</div><div class="food">🍔 Burger</div>
<div class="food">🌮 Tacos</div><div class="food">🥩 Steak</div>
<div class="food">🥗 Salad</div><div class="food">🍰 Dessert</div>
</div></div>

<div id="p3" class="screen"><h1>📅 Choose a date</h1>
<input type="date" id="d"><br><br><button onclick="finish()">Continue ❤️</button></div>

<div id="p4" class="screen">
<img class="gif" src="https://media.tenor.com/2roX3uxz_68AAAAC/love-bear.gif">
<h1>🥰 It's a Date!</h1><p id="r"></p></div>

<script>
let food="";
const s=x=>{document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));document.getElementById(x).classList.add("active")}
document.getElementById("yes").onclick=()=>s("p2");
const n=document.getElementById("no");
function mv(){n.style.position="absolute";n.style.left=Math.random()*(innerWidth-120)+"px";n.style.top=Math.random()*(innerHeight-60)+"px";}
n.onmouseenter=mv;n.ontouchstart=mv;
document.querySelectorAll(".food").forEach(f=>f.onclick=()=>{food=f.textContent;s("p3")});
function finish(){
 let d=document.getElementById("d").value;
 if(!d){alert("Choose a date!");return;}
 document.getElementById("r").innerHTML="Food: <b>"+food+"</b><br>Date: <b>"+d+"</b><br><br>See you soon ❤️";
 s("p4");
 setInterval(()=>{let h=document.createElement("div");h.className="heart";h.textContent="❤️";h.style.left=Math.random()*100+"vw";h.style.top="-20px";h.style.fontSize=(20+Math.random()*20)+"px";document.body.appendChild(h);setTimeout(()=>h.remove(),5000)},180);
}
</script></body></html>
